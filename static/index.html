<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 İndirici — Müzik Keşfet & İndir</title>
    <meta name="description" content="YouTube Music'ten resmi sanatçı şarkılarını ücretsiz 192kbps MP3 olarak indir. Kişisel öneriler için Google hesabınla giriş yap.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
    <a class="brand" href="/" id="homeLink" aria-label="Ana Sayfa">
        <div class="brand-mark">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18c0 1.1-1.34 2-3 2s-3-.9-3-2 1.34-2 3-2 3 .9 3 2zm12-2c0 1.1-1.34 2-3 2s-3-.9-3-2 1.34-2 3-2 3 .9 3 2z"/></svg>
        </div>
        <span class="brand-name">MP3 <em>İndirici</em></span>
    </a>

    <div class="search-row">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Şarkı, sanatçı veya albüm ara..." autocomplete="off" aria-label="Arama">
        <button id="searchBtn" type="button">Ara</button>
    </div>

    <div class="topbar-actions">
        <!-- Google Login button -->
        <a href="/api/auth/google/start" id="googleBtn" class="google-btn" style="display:none">
            <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google ile Giriş
        </a>
        <!-- User avatar (shown when logged in) -->
        <div id="userAvatar" class="user-avatar" style="display:none"></div>
    </div>
</header>

<div class="page">
    <div id="main"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
