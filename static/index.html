<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3 İndirici — Müzik Keşfet & İndir</title>
    <meta name="description" content="YouTube Music'ten resmi sanatçı şarkılarını ücretsiz 192kbps MP3 olarak indir.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
    <a class="brand" href="/" id="homeLink" aria-label="Ana Sayfa">
        <div class="brand-logo">
            <img src="/static/logo.png" alt="MP3 İndirici Logo">
        </div>
        <span class="brand-name">MP3 <em>İndirici</em></span>
    </a>

    <div class="search-row">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Şarkı, sanatçı veya albüm ara..." autocomplete="off" aria-label="Arama">
        <button id="searchBtn" type="button">Ara</button>
    </div>

    <div class="topbar-actions">
    </div>
</header>

<div class="page">
    <div id="main"></div>
</div>

<!-- Player Bar -->
<div id="playBar" class="play-bar hidden">
    <div class="play-bar-progress">
        <input type="range" id="playBarSeek" value="0" step="0.1" min="0" max="100" aria-label="İlerleme">
        <div id="progressBarFill" class="progress-bar-fill"></div>
    </div>
    <div class="play-bar-inner">
        <div class="player-info">
            <div class="thumb-wrap">
                <img id="playBarThumb" src="" alt="">
                <div class="thumb-overlay"></div>
            </div>
            <div class="player-meta">
                <div id="playBarTitle" class="player-title">Şarkı seçilmedi</div>
                <div id="playBarArtist" class="player-artist">Sanatçı</div>
            </div>
            <button class="btn-like" id="likeBtn" title="Beğen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            </button>
        </div>
        
        <div class="player-controls">
            <button class="ctrl-btn secondary" title="Karıştır">
                <svg viewBox="0 0 24 24"><path d="M14.83 13.41L13.42 14.83l4.44 4.45L22.31 16h-3.48l-4-2.59zM22.31 8L17.86 12.45l1.41 1.41L22.31 11V8zm-11 5.41L2.31 4h3.48l4 2.59 4.45-4.44-1.42-1.41-4.44 4.45L4.83 2.6V5.41l7.48 7.48z"/></svg>
            </button>
            <button class="ctrl-btn secondary" title="Önceki">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button id="playBtn" class="ctrl-btn main-play" title="Oynat/Duraklat">
                <svg viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
                <svg viewBox="0 0 24 24" id="pauseIcon" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="ctrl-btn secondary" title="Sonraki">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="ctrl-btn secondary" title="Tekrarla">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>

        <div class="player-right">
            <span id="playTime" class="player-time">0:00 / 0:00</span>
            <div class="volume-container">
                <button class="ctrl-btn small" id="muteBtn">
                    <svg viewBox="0 0 24 24" id="volHighIcon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
                <div class="volume-slider-wrap">
                    <input type="range" id="volumeSlider" min="0" max="100" value="100" aria-label="Ses">
                    <div id="volumeBarFill" class="volume-bar-fill"></div>
                </div>
            </div>
            <button class="ctrl-btn small" title="Sıradakiler">
                <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
            </button>
        </div>
    </div>
</div>

<div id="yt-player-hidden" style="position:fixed;top:-100px;left:-100px;width:1px;height:1px;pointer-events:none"></div>

<script src="/static/script.js"></script>
</body>
</html>
